<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Tasks Overview</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            margin: 0;
        }

        .content {
            padding: 35px;
        }

        .task-card {
            background: #eef2ff;
            border-radius: 10px;
            text-align: center;
            padding: 25px;
            margin: 25px 0;
        }

        .task-counter {
            font-size: 48px;
            font-weight: bold;
            color: #4f46e5;
            margin: 10px 0;
        }

        .success {
            background-color: #ecfdf5;
            border-left: 5px solid #10b981;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .warning {
            background-color: #fef2f2;
            border-left: 5px solid #ef4444;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background-color: #4f46e5;
            color: white !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #4338ca;
        }

        .footer {
            background-color: #f9fafb;
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 13px;
        }

        .date {
            color: #666;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📋 Daily Tasks Report</h1>
        <p>Twoje codzienne podsumowanie zadań</p>
    </div>

    <div class="content">

        <h2>Witaj <span th:text="${adminName}">Admin</span>! 👋</h2>

        <div class="task-card">
            <p>Aktualna liczba zadań</p>
            <div class="task-counter" th:text="${tasksQuantity}">0</div>
        </div>

        <div class="success" th:if="${tasksQuantity > 0}">
            ✅ W systemie znajdują się aktywne zadania.
        </div>

        <div class="warning" th:unless="${tasksQuantity > 0}">
            ⚠️ Aktualnie nie ma żadnych zadań do wykonania.
        </div>

        <a class="button" th:href="${applicationUrl}">
            Otwórz aplikację 🚀
        </a>

        <p class="date">
            Raport wygenerowano:
            <span th:text="${#temporals.format(reportDate, 'dd.MM.yyyy HH:mm')}"></span>
        </p>

    </div>

    <div class="footer">
        © Tasks Application <br>
        Ten e-mail został wygenerowany automatycznie.
    </div>

</div>

</body>
</html>
